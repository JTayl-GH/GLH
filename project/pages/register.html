<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>

    <link rel="stylesheet" href="/css/style.css">

</head>
<body class="register-page">
    
    <nav class="navbar">
        <a href="/" class="logo-container">
            <img src="/images/glh-logo.png" alt="Greenfield Local Hub Logo" class="logo-icon">
            <div class="logo-text">
                <span class="logo-title">Greenfield Local Hub</span>
                <span class="logo-subtitle">GLH</span>
            </div>
        </a>
    
        <!-- Action Links -->
        <div class="nav-links">

            <a href="/accessibility">Accessibility</a>
            <a href="/login">Sign In</a>
        </div>
    </nav>

    
    <div class="register-background">
        
        <main class="register-card">
            <h1>Create Your Account</h1>
            <p class="subtitle">Join Greenfield Local Hub to shop fresh, local products from farms and producers in your area.</p>
        
            <form action="/register" method="POST" class="register-form">
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name <span class="required">*</span></label>
                        <input type="text" id="firstName" name="firstName" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name <span class="required">*</span></label>
                        <input type="text" id="lastName" name="lastName" placeholder="Smith" required>
                    </div>
                </div>
        
                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="john.smith@email.co.uk" required>
                </div>
        
                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Password <span class="required">*</span></label>
                        <input type="password" id="password" name="password" placeholder="........." required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="........." required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number <span class="required">*</span></label>
                    <input type="tel" id="phone" name="phone" required>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="promo" name="promo">
                    <label for="promo">Sign up to receive promotional offers, limited deals etc.</label>
                </div>
        
                <div class="form-footer">
                    <button type="submit" class="btn-green">Create Account</button>
                    <p>Already have an account? <a href="/login">Sign In</a></p>
                </div>
            </form>
        </main>
    </div>

    <script src="/js/darkmode.js"></script>
</body>
</html>
