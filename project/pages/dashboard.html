<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/images/glh-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="stylesheet" href="/css/style.css">

</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo-container">
            <img src="/images/glh-logo.png" alt="Greenfield Local Hub Logo" class="logo-icon">
            <div class="logo-text">
                <span class="logo-title">Greenfield Local Hub</span>
                <span class="logo-subtitle">GLH</span>
            </div>
        </a>

        <!-- Action Links -->
        <div class="action-links">
            <div class="dropdown-menu">
                <a href="#" class="dropdown-toggle">Accessibility</a>
                <ul>
                    <li>
                        <button id="darkmode-toggle">
                            Dark Mode
                        </button>
                    </li>

                    <li><a href="#" onclick="increaseFontSize()">Text Size</a></li>
                    <li><a href="#" onclick="toggleHighContrast()">High Contrast Mode</a></li>
                </ul>
            </div>

            <a href="/dashboard">My Account</a>
        </div>
    </nav>
    
    <script src="/js/darkmode.js"></script>
</body>
</html>
