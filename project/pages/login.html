<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="/css/style.css">

</head>
<body class="login-page">

    <nav class="navbar">
        <a href="/" class="logo-container">
            <img src="/images/glh-logo.png" alt="Greenfield Local Hub Logo" class="logo-icon">
            <div class="logo-text">
                <span class="logo-title">Greenfield Local Hub</span>
                <span class="logo-subtitle">GLH</span>
            </div>
        </a>

        <div class="action-links">
            <a href="/accessibility">Accessibility</a>
            <a href="/register">Sign up</a>
        </div>
    </nav>

    <div class="login-background">
        
        <main class="login-card">
            <h1>Sign In</h1>
            <p class="subtitle">Log in to your Greenfield Local Hub account to shop fresh, local products in your area.</p>

            <form action="/login" method="POST" class="login-form">
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john.smith@email.co.uk" required autocomplete="email">
                </div>
        
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder=".........." required autocomplete="current-password">
                    
                    <div class="forgot-password-container">
                        <a href="/forgot-password" class="forgot-link">Forgot Password?</a>
                    </div>
                </div>

                <div class="form-footer">
                    <button type="submit" class="btn-green">Log In</button>
                </div>
            </form>
        </main>
    </div>

    <script src="/js/darkmode.js"></script>
</body>
</html>
