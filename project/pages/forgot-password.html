<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">

    <nav class="navbar">
        <a href="/" class="logo-container">
            <img src="/images/glh-logo.png" alt="Greenfield Local Hub Logo" class="logo-icon">
            <div class="logo-text">
                <span class="logo-title">Greenfield Local Hub</span>
                <span class="logo-subtitle">GLH</span>
            </div>
        </a>

        <div class="action-links">
            <a href="/accessibility">Accessibility</a>
            <a href="/login">Sign in</a>
        </div>
    </nav>

    <div class="login-background">
        
        <main class="login-card">
            <h1>Forgot Password?</h1>
            <p class="subtitle">Enter the email address associated with your account and we'll send you a link to reset your password.</p>

            <form action="/request-reset" method="POST" class="login-form">
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john.smith@email.co.uk" required autocomplete="email">
                </div>
        
                <div class="form-footer">
                    <button type="submit" class="btn-green">Send Reset Link</button>
                    <p><a href="/login" class="back-to-login">← Back to Sign In</a></p>
                </div>
            </form>
        </main>
    </div>

</body>
</html>
